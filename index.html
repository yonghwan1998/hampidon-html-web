<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>햄피돈 - 동네 맛집 탐험대</title>
    
    <!-- Google Fonts: Jua 적용 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Jua', sans-serif; background-color: #fffaf0; }
        
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
        
        #hero {
            position: relative;
            height: 500px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s ease-in-out;
            opacity: 0;
        }
        
        .hero-slide.active {
            opacity: 1;
        }

        .adventure-gradient {
            background: linear-gradient(135deg, rgba(255, 126, 95, 0.7), rgba(254, 211, 77, 0.7));
        }

        .floating-food-wrapper {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 50;
        }

        .floating-food {
            position: absolute;
            width: 24px;
            height: 24px;
            opacity: 0.95;
            filter: drop-shadow(0 0 4px rgba(0,0,0,0.25));
            animation: float-food linear infinite;
        }

        body, button, input, textarea, select, a {
            cursor: none !important;
        }

        .custom-cursor {
            position: fixed;
            width: 32px;
            height: 32px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        @keyframes float-food {
            0% { transform: translateX(-40px) translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateX(calc(100vw + 40px)) translateY(-20px) rotate(180deg); }
            100% { transform: translateX(calc(100vw + 80px)) translateY(20px) rotate(360deg); opacity: 0; }
        }

        /* 강조 스타일 */
        .highlight {
            transition: color 0.5s ease, text-shadow 0.5s ease;
            color: white;
            text-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        .active-burger { color: #f6e05e !important; text-shadow: 0 0 20px #f6e05e !important; }
        .active-pizza { color: #fc8181 !important; text-shadow: 0 0 20px #fc8181 !important; }
        .active-tonkatsu { color: #fbd38d !important; text-shadow: 0 0 20px #fbd38d !important; }
    </style>
</head>
<body class="text-gray-900">
    <nav class="bg-white/90 backdrop-blur-sm sticky top-0 z-[100] shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-orange-600">햄.피.돈</a>
            <div class="space-x-6 font-bold text-lg">
                <a href="about.html" class="hover:text-orange-500 transition">About</a>
                <a href="index.html" class="text-orange-500 border-b-2 border-orange-500 transition">맛집 탐험</a>
            </div>
        </div>
    </nav>

    <div id="floating-food-wrapper" class="floating-food-wrapper"></div>
    <div id="custom-cursor" class="custom-cursor"></div>

    <header id="hero" class="text-center">
        <div class="hero-slide active" style="background-image: url('https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=1600&q=80');"></div>
        <div class="hero-slide" style="background-image: url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=1600&q=80');"></div>
        <div class="hero-slide" style="background-image: url('https://recipe1.ezmember.co.kr/cache/recipe/2022/10/24/0f16eff9ca4f07a1db05024a6c18a6841.jpg');"></div>

        <div class="absolute inset-0 adventure-gradient z-[1]"></div>

        <div class="relative z-[2] px-4 text-white">
            <h1 class="text-5xl md:text-7xl font-bold mb-4 drop-shadow-lg">
                <span id="t-ham" class="highlight active-burger">햄</span>.<span id="t-pi" class="highlight">피</span>.<span id="t-don" class="highlight">돈</span>
            </h1>
            <p id="hero-sub" class="text-xl md:text-3xl mb-6 drop-shadow-md font-bold">
                "우리의 행복은 <span id="h-burger" class="highlight active-burger">햄버거</span>와 
                <span id="h-pizza" class="highlight">피자</span>와 
                <span id="h-tonkatsu" class="highlight">돈까스</span>에서 온다"
            </p>
            <p class="text-lg md:text-xl mb-8 text-white drop-shadow-md">
                <span class="text-red-500 font-extrabold uppercase text-2xl md:text-3xl tracking-wider">지독하게 컨셉 잡은</span> 햄.피.돈 러버들은 여기로 모이시오.
            </p>
            <a href="#submit" class="bg-white text-orange-600 font-bold py-4 px-10 rounded-full shadow-2xl hover:scale-105 transition transform">탐험 시작하기</a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-16">
        <section id="display" class="bg-white p-10 rounded-3xl shadow-2xl border-l-8 border-orange-500 mb-16">
            <div id="main-display">
                <h2 id="disp-name" class="text-4xl font-bold mb-3">햄.피.돈에 오신 것을 환영합니다!</h2>
                <p id="disp-menu" class="text-gray-600 text-lg mb-6">맛집을 선택해 탐험을 떠나보세요.</p>
                <!-- 지도 영역은 추후 사용을 위해 주석 처리되었습니다.
                <div id="disp-map" class="w-full h-56 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-400 border-2 border-dashed border-orange-300">지도가 여기에 표시됩니다.</div>
                -->
            </div>

            <div class="border-t border-gray-200 mt-10 pt-10">
                <h3 class="text-3xl font-bold mb-3">맛집 랭킹 리스트</h3>
                <p class="text-gray-500 mb-8">아래 리스트를 눌러 정보를 확인해보세요!</p>
                <ul id="rank-list" class="space-y-4">
                    <!-- Dynamic Items -->
                </ul>
            </div>
        </section>

        <section id="features" class="grid md:grid-cols-4 gap-8 mb-16">
            <div class="bg-gradient-to-br from-yellow-300 to-yellow-500 p-8 rounded-3xl shadow-lg text-white text-center transform hover:-translate-y-2 transition">
                <div class="text-5xl mb-4">🍔</div>
                <h4 class="font-bold text-xl">전문 타겟팅</h4>
            </div>
            <div class="bg-gradient-to-br from-orange-400 to-orange-600 p-8 rounded-3xl shadow-lg text-white text-center transform hover:-translate-y-2 transition">
                <div class="text-5xl mb-4">⏱️</div>
                <h4 class="font-bold text-xl">시간 단축</h4>
            </div>
            <div class="bg-gradient-to-br from-red-400 to-red-600 p-8 rounded-3xl shadow-lg text-white text-center transform hover:-translate-y-2 transition">
                <div class="text-5xl mb-4">🛡️</div>
                <h4 class="font-bold text-xl">신뢰 정보</h4>
            </div>
            <div class="bg-gradient-to-br from-yellow-600 to-yellow-800 p-8 rounded-3xl shadow-lg text-white text-center transform hover:-translate-y-2 transition">
                <div class="text-5xl mb-4">📍</div>
                <h4 class="font-bold text-xl">직관적 위치</h4>
            </div>
        </section>

        <section id="submit" class="bg-white p-10 rounded-3xl shadow-2xl border-4 border-orange-200 max-w-2xl mx-auto">
            <h3 class="text-3xl font-bold mb-8 text-center text-orange-600">나만의 맛집 공유하기</h3>
            
            <div class="w-full h-56 bg-gray-100 rounded-2xl flex items-center justify-center text-gray-400 mb-8 border-2 border-dashed border-gray-300">
                맛집 위치 확인용 지도 영역
            </div>

            <form id="food-form" class="space-y-5">
                <input type="text" id="res-name" placeholder="맛집 이름 입력" class="w-full p-4 rounded-2xl border-2 border-orange-100 focus:border-orange-500 outline-none">
                <input type="text" id="res-menu" placeholder="메뉴명" class="w-full p-4 rounded-2xl border-2 border-orange-100 focus:border-orange-500 outline-none">
                <input type="number" id="res-rating" min="1" max="5" placeholder="별점 (1~5점)" class="w-full p-4 rounded-2xl border-2 border-orange-100 focus:border-orange-500 outline-none">
                <button type="submit" class="w-full bg-orange-600 text-white font-bold py-5 rounded-2xl hover:bg-orange-700 transition text-lg shadow-lg">저장하기</button>
            </form>
        </section>
    </main>

    <footer class="py-12 text-center text-gray-500">
        <p>&copy; 2026 햄피돈 탐험대. All Rights Reserved.</p>
    </footer>

    <script>
        const slides = document.querySelectorAll('.hero-slide');
        
        // 제목과 서브타이틀 강조 요소들
        const titles = [document.getElementById('t-ham'), document.getElementById('t-pi'), document.getElementById('t-don')];
        const subs = [document.getElementById('h-burger'), document.getElementById('h-pizza'), document.getElementById('h-tonkatsu')];
        const colors = ['active-burger', 'active-pizza', 'active-tonkatsu'];

        let currentSlide = 0;

        function updateHighlights(index) {
            // 제목 강조 업데이트
            titles.forEach((t, i) => t.className = 'highlight' + (i === index ? ' ' + colors[i] : ''));
            // 서브타이틀 강조 업데이트
            subs.forEach((s, i) => s.className = 'highlight' + (i === index ? ' ' + colors[i] : ''));
        }

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
            updateHighlights(currentSlide);
        }

        setInterval(nextSlide, 5000);

        const restaurants = [
            { id: 1, name: "돈까스천국", menu: "안심 돈까스", rating: 5 },
            { id: 2, name: "도미노피자", menu: "포테이토 피자", rating: 4.5 }
        ];

        function renderList() {
            const listEl = document.getElementById('rank-list');
            listEl.innerHTML = '';
            restaurants.forEach(r => {
                const li = document.createElement('li');
                li.className = "p-6 bg-orange-50 rounded-2xl cursor-pointer hover:bg-orange-100 transition transform hover:scale-[1.02] shadow-sm";
                li.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <strong class="text-xl">${r.name}</strong>
                            <p class="text-gray-600">${r.menu}</p>
                        </div>
                        <div class="text-orange-600 font-bold">★ ${r.rating}점</div>
                    </div>
                `;
                li.onclick = () => updateMain(r);
                listEl.appendChild(li);
            });
        }

        function updateMain(r) {
            document.getElementById('disp-name').innerText = r.name;
            document.getElementById('disp-menu').innerText = `추천 메뉴: ${r.menu} | 평점: ${r.rating}점`;
        }

        const floatingFoods = [
            'img/16x16-hamburger.png',
            'img/16x16-pizza.png',
            'img/16x16-cutlet.png'
        ];

        function createFloatingFood() {
            const wrapper = document.getElementById('floating-food-wrapper');
            const food = document.createElement('img');
            food.src = floatingFoods[Math.floor(Math.random() * floatingFoods.length)];
            food.className = 'floating-food';
            food.style.top = `${Math.random() * 75 + 8}vh`;
            food.style.animationDuration = `${Math.random() * 6 + 6}s`;
            food.style.animationDelay = `${Math.random() * 4}s`;
            wrapper.appendChild(food);
            food.addEventListener('animationend', () => wrapper.removeChild(food));
        }

        function startFloatingFoods() {
            for (let i = 0; i < 5; i++) {
                setTimeout(createFloatingFood, i * 600);
            }
            setInterval(createFloatingFood, 1200);
        }

        const cursorFoods = [
            'img/16x16-hamburger.png',
            'img/16x16-pizza.png',
            'img/16x16-cutlet.png'
        ];

        const customCursor = document.getElementById('custom-cursor');
        let cursorIndex = 0;

        function updateCursorImage() {
            customCursor.style.backgroundImage = `url('${cursorFoods[cursorIndex]}')`;
        }

        function startCursorCycle() {
            updateCursorImage();
            setInterval(() => {
                cursorIndex = (cursorIndex + 1) % cursorFoods.length;
                updateCursorImage();
            }, 900);
        }

        document.addEventListener('mousemove', (event) => {
            customCursor.style.left = `${event.clientX}px`;
            customCursor.style.top = `${event.clientY}px`;
        });

        document.getElementById('food-form').onsubmit = (e) => {
            e.preventDefault();
            const newRes = {
                id: Date.now(),
                name: document.getElementById('res-name').value,
                menu: document.getElementById('res-menu').value,
                rating: document.getElementById('res-rating').value
            };
            if(!newRes.name) return;
            restaurants.push(newRes);
            renderList();
            e.target.reset();
        };

        renderList();
        updateMain(restaurants[0]);
        startFloatingFoods();
        startCursorCycle();
    </script>
</body>
</html>
